name: "Python Lint"
description: "Lint Python code with Ruff, optionally Black and MyPy."
author: "saumitrapatil"

branding:
  icon: check-circle
  color: blue

inputs:
  python-version:
    description: "Python version to install."
    required: false
    default: "3.12"
  run-black:
    description: "Also run `black --check`."
    required: false
    default: "false"
  run-mypy:
    description: "Also run `mypy`."
    required: false
    default: "false"
  working-directory:
    description: "Directory to lint from (relative to the workspace root)."
    required: false
    default: "."
  ruff-version:
    description: "Pinned version of Ruff to install (empty = latest)."
    required: false
    default: ""
  black-version:
    description: "Pinned version of Black to install (empty = latest)."
    required: false
    default: ""
  mypy-version:
    description: "Pinned version of MyPy to install (empty = latest)."
    required: false
    default: ""

outputs:
  ruff-exit-code:
    description: "Exit code returned by Ruff."
    value: ${{ steps.lint.outputs.ruff-exit-code }}
  black-exit-code:
    description: "Exit code returned by Black (empty if not run)."
    value: ${{ steps.lint.outputs.black-exit-code }}
  mypy-exit-code:
    description: "Exit code returned by MyPy (empty if not run)."
    value: ${{ steps.lint.outputs.mypy-exit-code }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Lint
      id: lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_RUN_BLACK: ${{ inputs.run-black }}
        INPUT_RUN_MYPY: ${{ inputs.run-mypy }}
        INPUT_RUFF_VERSION: ${{ inputs.ruff-version }}
        INPUT_BLACK_VERSION: ${{ inputs.black-version }}
        INPUT_MYPY_VERSION: ${{ inputs.mypy-version }}
      run: ${{ github.action_path }}/scripts/lint.sh
