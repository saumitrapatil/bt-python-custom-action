name: "Python Build"
description: "Build a Python distribution (sdist + wheel) and optionally build/push a Docker image."
author: "saumitrapatil"

branding:
  icon: package
  color: blue

inputs:
  python-version:
    description: "Python version to install."
    required: false
    default: "3.12"
  working-directory:
    description: "Directory containing the Python project to build."
    required: false
    default: "."

  build-python:
    description: "Build a Python source and wheel distribution."
    required: false
    default: "true"
  build-tool-version:
    description: "Pinned version of the PyPA `build` package (empty = latest)."
    required: false
    default: ""
  python-artifact-name:
    description: "Name of the uploaded Python dist artifact."
    required: false
    default: "python-dist"
  artifact-retention-days:
    description: "How long GitHub retains uploaded artifacts."
    required: false
    default: "14"

  build-docker:
    description: "Build a Docker image from the project's Dockerfile."
    required: false
    default: "false"
  docker-context:
    description: "Docker build context."
    required: false
    default: "."
  docker-file:
    description: "Path to the Dockerfile."
    required: false
    default: "Dockerfile"
  docker-tags:
    description: "Newline-separated list of image tags."
    required: false
    default: ""
  docker-platforms:
    description: "Comma-separated build platforms (e.g. 'linux/amd64,linux/arm64')."
    required: false
    default: "linux/amd64"
  docker-push:
    description: "Push the built image to the configured registry."
    required: false
    default: "false"
  docker-load:
    description: "Load the built image into the local Docker daemon (single-platform only)."
    required: false
    default: "false"
  docker-registry:
    description: "Registry hostname for login (e.g. 'ghcr.io'). Empty disables login."
    required: false
    default: ""
  docker-username:
    description: "Username for registry login."
    required: false
    default: ""
  docker-password:
    description: "Password/token for registry login."
    required: false
    default: ""
  docker-build-args:
    description: "Newline-separated build args (KEY=VALUE)."
    required: false
    default: ""
  docker-cache-from:
    description: "Newline-separated cache-from sources (defaults to GitHub Actions cache)."
    required: false
    default: "type=gha"
  docker-cache-to:
    description: "Newline-separated cache-to destinations (defaults to GitHub Actions cache, mode=max)."
    required: false
    default: "type=gha,mode=max"

outputs:
  python-build-system:
    description: "Detected Python build system (setuptools, hatchling, poetry, flit, pdm, unknown, none)."
    value: ${{ steps.python-build.outputs.build-system }}
  python-dist-path:
    description: "Absolute path to the Python dist/ directory."
    value: ${{ steps.python-build.outputs.dist-path }}
  docker-image-id:
    description: "ID of the built Docker image (sha256 digest when pushed)."
    value: ${{ steps.docker-build.outputs.imageid }}
  docker-digest:
    description: "Pushed image digest (only set when docker-push=true)."
    value: ${{ steps.docker-build.outputs.digest }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      if: inputs.build-python == 'true'
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Build Python distribution
      id: python-build
      if: inputs.build-python == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_BUILD_TOOL_VERSION: ${{ inputs.build-tool-version }}
      run: ${{ github.action_path }}/scripts/build.sh

    - name: Upload Python dist artifact
      if: inputs.build-python == 'true' && steps.python-build.outputs.dist-path != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.python-artifact-name }}
        path: ${{ inputs.working-directory }}/dist/*
        if-no-files-found: warn
        retention-days: ${{ inputs.artifact-retention-days }}

    - name: Set up Docker Buildx
      if: inputs.build-docker == 'true'
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Log in to registry
      if: inputs.build-docker == 'true' && inputs.docker-registry != '' && inputs.docker-username != '' && inputs.docker-password != ''
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ${{ inputs.docker-registry }}
        username: ${{ inputs.docker-username }}
        password: ${{ inputs.docker-password }}

    - name: Build (and optionally push) Docker image
      id: docker-build
      if: inputs.build-docker == 'true'
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        context: ${{ inputs.docker-context }}
        file: ${{ inputs.docker-file }}
        platforms: ${{ inputs.docker-platforms }}
        push: ${{ inputs.docker-push }}
        load: ${{ inputs.docker-load }}
        tags: |
          ${{ inputs.docker-tags }}
        build-args: |
          ${{ inputs.docker-build-args }}
        cache-from: |
          ${{ inputs.docker-cache-from }}
        cache-to: |
          ${{ inputs.docker-cache-to }}
