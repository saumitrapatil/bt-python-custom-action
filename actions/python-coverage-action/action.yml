name: "Python Coverage"
description: "Run pytest with coverage, emit coverage.xml and junit.xml, and optionally upload to SonarQube/SonarCloud or Codecov."
author: "saumitrapatil"

branding:
  icon: bar-chart-2
  color: blue

inputs:
  python-version:
    description: "Python version to install."
    required: false
    default: "3.12"
  pytest-args:
    description: "Additional arguments forwarded to pytest."
    required: false
    default: ""
  working-directory:
    description: "Directory to run tests from."
    required: false
    default: "."
  artifact-name:
    description: "Name of the uploaded artifact bundle."
    required: false
    default: "coverage-reports"
  artifact-retention-days:
    description: "How long GitHub should retain the uploaded artifact."
    required: false
    default: "14"
  fail-on-no-tests:
    description: "Fail the action if pytest collects no tests (pytest exit code 5)."
    required: false
    default: "true"
  sonar-enabled:
    description: "Enable SonarQube/SonarCloud integration."
    required: false
    default: "false"
  sonar-token:
    description: "Sonar token (required if sonar-enabled is true)."
    required: false
    default: ""
  sonar-host-url:
    description: "SonarQube host URL (defaults to SonarCloud if empty)."
    required: false
    default: ""
  codecov-enabled:
    description: "Enable Codecov integration."
    required: false
    default: "false"
  codecov-token:
    description: "Codecov token (required for private repos)."
    required: false
    default: ""

outputs:
  coverage-report-path:
    description: "Generated coverage XML report path."
    value: ${{ steps.coverage.outputs.coverage-report-path }}
  junit-report-path:
    description: "Generated JUnit report path."
    value: ${{ steps.coverage.outputs.junit-report-path }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Run pytest with coverage
      id: coverage
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_PYTEST_ARGS: ${{ inputs.pytest-args }}
        INPUT_FAIL_ON_NO_TESTS: ${{ inputs.fail-on-no-tests }}
      run: ${{ github.action_path }}/scripts/coverage.sh

    - name: Upload coverage artifacts
      if: always() && steps.coverage.outputs.coverage-report-path != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          ${{ inputs.working-directory }}/coverage.xml
          ${{ inputs.working-directory }}/junit.xml
        retention-days: ${{ inputs.artifact-retention-days }}
        if-no-files-found: warn

    - name: Sonar scan
      if: inputs.sonar-enabled == 'true' && inputs.sonar-token != ''
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
      env:
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        SONAR_HOST_URL: ${{ inputs.sonar-host-url }}
      with:
        projectBaseDir: ${{ inputs.working-directory }}

    - name: Upload to Codecov
      if: inputs.codecov-enabled == 'true' && inputs.codecov-token != ''
      uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
      with:
        token: ${{ inputs.codecov-token }}
        files: ${{ inputs.working-directory }}/coverage.xml
        fail_ci_if_error: true
