name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: saumitrapatil/bt-python-custom-action/actions/python-lint-action@v1
        with:
          python-version: "3.12"
          run-black: "true"
          run-mypy: "true"

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0   # required by Sonar for blame-based attribution
      - uses: saumitrapatil/bt-python-custom-action/actions/python-coverage-action@v1
        with:
          python-version: "3.12"
          sonar-enabled: "true"
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          codecov-enabled: "true"
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Trivy filesystem scan
        uses: saumitrapatil/bt-python-custom-action/actions/trivy-fs-action@v1

      - name: TruffleHog secret scan
        uses: saumitrapatil/bt-python-custom-action/actions/trufflehog-action@v1

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: saumitrapatil/bt-python-custom-action/actions/python-build-action@v1
        with:
          python-version: "3.12"
