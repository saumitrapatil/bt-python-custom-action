name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: saumitrapatil/bt-python-custom-action/actions/python-lint-action@v1

  test:
    name: Test + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: saumitrapatil/bt-python-custom-action/actions/python-coverage-action@v1

  fs-security:
    name: Filesystem security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: saumitrapatil/bt-python-custom-action/actions/trivy-fs-action@v1
      - uses: saumitrapatil/bt-python-custom-action/actions/trufflehog-action@v1

  build-and-scan-image:
    name: Build, scan, and (on tag) push image
    runs-on: ubuntu-latest
    needs: [lint, test, fs-security]
    permissions:
      contents: read
      packages: write
      security-events: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build Python dist + Docker image (load locally for scanning)
        id: build
        uses: saumitrapatil/bt-python-custom-action/actions/python-build-action@v1
        with:
          build-docker: "true"
          docker-load: "true"
          docker-tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Scan built image with Trivy
        uses: saumitrapatil/bt-python-custom-action/actions/trivy-image-action@v1
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push image (tag-triggered releases only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: saumitrapatil/bt-python-custom-action/actions/python-build-action@v1
        with:
          build-python: "false"
          build-docker: "true"
          docker-push: "true"
          docker-registry: ghcr.io
          docker-username: ${{ github.actor }}
          docker-password: ${{ secrets.GITHUB_TOKEN }}
          docker-tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
